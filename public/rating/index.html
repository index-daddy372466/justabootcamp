<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../query.css">
    <link rel="stylesheet" href="styles.css">
    <title>Rating/Review</title>
</head>


<body>
    
    <div id="wrapper">
        <h2 id="rating-title">Rate & Review</h2>


        <section id="rating-container">
        <img alt="" src="./media/star_blank.png" class="star-blank star">
        <img alt="" src="./media/star_blank.png" class="star-blank star">
        <img alt="" src="./media/star_blank.png" class="star-blank star">
        <img alt="" src="./media/star_blank.png" class="star-blank star">
        <img alt="" src="./media/star_blank.png" class="star-blank star">
    </section>


    <div id="questions-container">

        <!-- <div id="poll-question">What areas are you hoping to improve through training?</div> -->
        <div id="poll-question" class="header-font">What did you like about class the most?</div>
        <ul id="poll-container">
            <li class="poll-item">Slim Down</li>
            <li class="poll-item">Increase Stamina</li>
            <li class="poll-item">Upperbody Strength</li>
            <li class="poll-item">Lowerbody Strength</li>
            <li class="poll-item">Increase Flexibility</li>
        </ul>
        

    </div>

    <div id="feedback-container">
            <!-- open-ended -->
            <div id="poll-question" class="header-font">Feedback (Optional)</div>
            <textarea name="feedback" rows="5" id="textarea-feedback" placeholder="Start typing..."></textarea>
        </div>

        <button id="form-submit">Submit</button>

    </div>


    <footer>
        <div id="contact">
            <h5 id="logo-title-footer" class="header-font">Just <p style="color:#f00 !important">A</p> Bootcamp</h5>
            <a id="mailto" href="mailto:justabootcamp@gmail.com">Email Us</a>
        </div>

            <p class="roboto-font primary-color">Copyright © 2026 JustABootcamp</p>
    </footer>
</body>



<script type="module" src="./main.js"></script>
</html>
