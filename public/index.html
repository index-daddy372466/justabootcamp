<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Just A Bootcamp</title>
</head>
<body>
    <header>
        <div id="logo-container">
            <h1 id="logo-title" class="header-font">Just <p style="color:#f00 !important">A</p> Bootcamp</h1>
        </div>
    </header>

    <main>

        <div id="details-container">
            <a draggable="false" href="" target="_blank" class="details-btn instagram-btn">
                <p class="details-btn-para header-font">Follow JustABootcamp</p>
            </a>
            <a draggable="false" href="" target="_blank" class="details-btn instagram-btn">
                <p class="details-btn-para header-font">Follow Louis</p>
            </a>
            <a draggable="false" href="https://www.instagram.com/its_kyle_anthony/" target="_blank" class="details-btn instagram-btn">
                <p class="details-btn-para header-font">Follow Kyle</p>
            </a>
            <a draggable="false" href="/review" target="_blank" class="details-btn">
                <p class="details-btn-para header-font">Leave a review</p>
            </a>
            <a draggable="false" href="#contact" class="details-btn">
                <p class="details-btn-para header-font">Contact Us</p>
            </a>
        </div>
        
        <!-- media -->
         <div id="img-container"><img src="./justabootcamp.png" alt="" id="img-main"></div>

    </main>

    <footer>
        <div id="contact">
            <h5 id="logo-title-footer" class="header-font">Just <p style="color:#f00 !important">A</p> Bootcamp</h5>
            <p class="roboto-font primary-color">Copyright © 2026 JustABootcamp</p>

        </div>
    </footer>

    <script src="./main.js"></script>
</body>
</html>
